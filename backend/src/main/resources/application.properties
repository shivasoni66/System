# Spring Web Port (Binds to Render's allocated PORT env variable, defaulting to 8080)
server.port=${PORT:8080}

# MongoDB Configuration (Reads from MONGODB_URI env variable, defaulting to your Atlas cluster)
spring.data.mongodb.uri=${MONGODB_URI:mongodb+srv://System:<db_password>@cluster0.m93hofd.mongodb.net/SYSTEM?retryWrites=true&w=majority&appName=Cluster0}

# For MongoDB Atlas cloud connection:
# spring.data.mongodb.uri=mongodb+srv://shiva:<password>@cluster0.mongodb.net/SYSTEM?retryWrites=true&w=majority

# Disable automatic schema/index validation logs
logging.level.org.springframework.data.mongodb.core.MongoTemplate=WARN
